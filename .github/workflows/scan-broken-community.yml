name: PRESET - Broken baseline - community_scan on gated repo

# Reproduces the customer's original failure mode. Useful as the "before"
# half of a before/after demonstration: this job is expected to fail with
# a HUGGING_FACE_REPO_GATED error from the HL backend, because the
# community_scan code path doesn't forward an HF token at all.
#
# Set `fail_on_detection: false` so the workflow doesn't conflate the
# expected backend error with a real detection failure.

on:
  workflow_dispatch:

# To re-test against v1.0.5 instead of v1.0.8, change the `@v1.0.8` tag below.
# (GitHub Actions does not allow expressions in the `uses:` clause, so we
# can't parameterize the version via workflow_dispatch input.)

jobs:
  scan:
    runs-on: ubuntu-latest
    name: Community scan google/gemma-3-12b-it (expected to FAIL)
    steps:
      - uses: actions/checkout@v3

      - name: Scan via community_scan path (no HF token plumbed through)
        id: scan
        continue-on-error: true
        uses: hiddenlayerai/hiddenlayer-model-scan-github-action@v1.0.8
        with:
          model_path: google/gemma-3-12b-it
          model_version: main
          community_scan: HUGGING_FACE
          fail_on_detection: false
        env:
          HL_CLIENT_ID:      ${{ secrets.HL_CLIENT_ID }}
          HL_CLIENT_SECRET:  ${{ secrets.HL_CLIENT_SECRET }}
          # HUGGINGFACE_TOKEN intentionally NOT passed -- the community_scan path ignores it anyway.

      - name: Show the expected gated-repo error
        if: always()
        run: |
          echo "If the step above failed with HUGGING_FACE_REPO_GATED,"
          echo "that confirms the customer-reported behavior."
          echo "Step outcome: ${{ steps.scan.outcome }}"

name: Scan HuggingFace Model

on:
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  scan_huggingface_model:
    runs-on: ubuntu-latest
    name: Scan google/gemma-3-1b-it via hf://
    steps:
      - uses: actions/checkout@v3

      - name: Free disk space on runner
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: false
          swap-storage: true

      - name: Show disk space after cleanup
        run: df -h /

      - name: Scan HuggingFace Model
        id: scan_model_huggingface
        uses:  hiddenlayerai/hiddenlayer-model-scan-github-action@user_specified_http_timeout
        with:
          model_path: hf://google/gemma-3-1b-it
          fail_on_detection: false
          sarif_file: output.sarif
        env:
          HL_CLIENT_ID: ${{ secrets.HL_CLIENT_ID }}
          HL_CLIENT_SECRET: ${{ secrets.HL_CLIENT_SECRET }}
          HUGGINGFACE_TOKEN: ${{ secrets.HF_TOKEN }}

      - name: Show disk space after scan
        if: always()
        run: df -h /

      - name: Check for SARIF output
        if: always()
        run: |
          echo "Current directory: $(pwd)"
          ls -al

      - name: Upload SARIF file
        if: always() && hashFiles('output.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: output.sarif
